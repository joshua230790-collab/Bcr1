<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Notificaciones</title>
<style>
body{font-family:Arial,sans-serif;background:#0f172a;color:white;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.card{background:#1e293b;padding:24px;border-radius:16px;width:320px;text-align:center}
input,textarea,button{width:100%;margin:8px 0;padding:10px;border-radius:10px;border:none}
button{background:#22c55e;color:white;font-weight:bold;cursor:pointer}
</style>
</head>
<body>
<div class="card">
<h2>Notificaciones</h2>
<input id="t" value="Hola">
<textarea id="b">Esta es una notificación de prueba.</textarea>
<button onclick="pedir()">Solicitar permiso</button>
<button onclick="enviar()">Enviar notificación</button>
<p id="s"></p>
</div>
<script>
function estado(x){document.getElementById("s").textContent=x;}
async function pedir(){
 if(!("Notification" in window)){estado("No compatible");return;}
 let p=await Notification.requestPermission();
 estado("Permiso: "+p);
}
function enviar(){
 if(Notification.permission!=="granted"){estado("Primero concede el permiso");return;}
 new Notification(document.getElementById("t").value,{
   body:document.getElementById("b").value
 });
 estado("Notificación enviada");
}
</script>
</body>
</html>
